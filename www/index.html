<!DOCTYPE html>
<html>
<head><title>BLDC Sim</title></head>
<body>
  <h1>BLDC Motor Simulation</h1>
  <p>Web server is working!</p>

  <h2>Live Motor Data</h2>
  <table border="1">
    <tr><th>Variable</th><th>Value</th></tr>
    <tr><td>RPM</td>     <td id="rpm">--</td></tr>
    <tr><td>Torque</td>  <td id="torque">--</td></tr>
    <tr><td>Current</td> <td id="current">--</td></tr>
    <tr><td>Voltage</td> <td id="voltage">--</td></tr>
  </table>

  <script>
    const port = new URLSearchParams(window.location.search).get('port') || 49152;
    const ws = new WebSocket(`ws://localhost:${port}`);
    ws.onopen = () => {
      ws.send("trick.var_add(\"bldc_sim.motor.rpm\")\n");
      ws.send("trick.var_add(\"bldc_sim.motor.torque\")\n");
      ws.send("trick.var_add(\"bldc_sim.motor.current\")\n");
      ws.send("trick.var_add(\"bldc_sim.motor.voltage\")\n");
      ws.send("trick.var_cycle(100)\n");
    };
    ws.onmessage = (event) => {
      const vals = event.data.trim().split("\t");
      if (vals.length >= 4) {
        document.getElementById("rpm").innerText     = parseFloat(vals[1]).toFixed(2);
        document.getElementById("torque").innerText  = parseFloat(vals[2]).toFixed(2);
        document.getElementById("current").innerText = parseFloat(vals[3]).toFixed(2);
        document.getElementById("voltage").innerText = parseFloat(vals[4]).toFixed(2);
      }
    };
  </script>
</body>
</html>
